[General]
BackupBeforeSave=true
BackupFilePathPattern={DB_FILENAME}.backup.kdbx
ConfigVersion=2

[Browser]
Enabled=true
UpdateBinaryPath=false

[GUI]
ApplicationTheme=classic
CompactMode=true
MinimizeOnClose=true
MinimizeOnStartup=true
MinimizeToTray=true
ShowTrayIcon=true
TrayIconAppearance=colorful

[PasswordGenerator]
AdditionalChars=
ExcludedChars=

[SSHAgent]
Enabled=true
UseOpenSSH=true
UsePageant=false

[Security]
ClearClipboardTimeout=30
LockDatabaseIdle=true
LockDatabaseIdleSeconds=14400
